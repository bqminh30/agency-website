<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Glowing subtle drop shadow filter -->
  <defs>
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#006C71" />
      <stop offset="100%" stop-color="#002B4D" />
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F5FF" />
      <stop offset="100%" stop-color="#0080FF" />
    </linearGradient>
  </defs>

  <!-- Background Base circle or abstract shape -->
  <rect width="100" height="100" rx="24" fill="url(#primaryGrad)" />
  
  <!-- Sleek Tech Graphic (Intersecting Dev Brackets + Agency Star) -->
  <g filter="url(#glow)">
    <!-- Code bracket symbol left "<" -->
    <path d="M35 32L18 50L35 68" stroke="url(#cyanGrad)" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Code bracket symbol right ">" -->
    <path d="M65 32L82 50L65 68" stroke="url(#cyanGrad)" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Dynamic slash middle "/" -->
    <path d="M56 26L44 74" stroke="#FFFFFF" stroke-width="5.5" stroke-linecap="round" />
  </g>

  <!-- Abstract micro-dots to feel like a premium node network -->
  <circle cx="50" cy="20" r="2.5" fill="#00F5FF" />
  <circle cx="20" cy="50" r="2" fill="#FFFFFF" opacity="0.8" />
  <circle cx="80" cy="50" r="2" fill="#FFFFFF" opacity="0.8" />
  <circle cx="50" cy="80" r="2.5" fill="#00F5FF" />
</svg>
